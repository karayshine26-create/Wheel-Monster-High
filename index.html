        @import url('https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;700&display=swap');
        body { font-family: 'Mitr', sans-serif; background: radial-gradient(circle, #1a0b2e 0%, #05010d 100%); }
        .neon-border { box-shadow: 0 0 20px rgba(236, 72, 153, 0.4); }
        .neon-text { text-shadow: 0 0 12px rgba(236, 72, 153, 0.8); }
        .magic-beam { position: absolute; width: 6px; height: 150px; border-radius: 50%; opacity: 0; pointer-events: none; }
        @keyframes beamCollapse {
            0% { opacity: 1; transform: rotate(var(--rotation)) translateY(-350px) scaleY(1); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: rotate(var(--rotation)) translateY(0px) scaleY(0.1); }

        #fade-screen { transition: opacity 0.5s ease; }

            const fade = document.getElementById("fade-screen");

                const beam = document.createElement("div");
                beam.className = "magic-beam";
                beam.style.setProperty('--rotation', `${i * 60}deg`);
                beam.style.background = i % 2 === 0 ? "linear-gradient(to top, #ec4899, transparent)" : "linear-gradient(to top, #00ffff, transparent)";
                beam.style.animation = "beamCollapse 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards";
                container.appendChild(beam);
            }

            document.getElementById("res-palette-container").innerHTML = `
                <span class="text-pink-400 font-bold block mb-3">🎨 พาเลทสีประจำตัว (5 สี):</span>
                <div class="grid grid-cols-2 sm:grid-cols-5 gap-2.5">
                    ${palette.map(c => `
                        <div class="flex flex-col items-center p-2 bg-gray-950 rounded-lg border border-white/5">
                            <div class="w-10 h-10 rounded-full border border-white/20 mb-1" style="background-color: ${c.hex}"></div>
                            <span class="text-[10px] text-white font-bold truncate w-full text-center">${c.name}</span>
                            <span class="text-[9px] text-pink-400 font-mono">${c.hex}</span>
                        </div>`).join("")}
                </div>
            `;

            setTimeout(() => {
                fade.classList.add("opacity-100");
                setTimeout(() => {
                    document.getElementById("home-screen").classList.add("hidden");
                    document.getElementById("result-screen").classList.remove("hidden");
                    setTimeout(() => {
                        document.getElementById("result-screen").classList.remove("opacity-0");
                        fade.classList.remove("opacity-100");
                    }, 100);
                }, 500);
            }, 500);
        }

        function backToHome() {
            document.getElementById("result-screen").classList.add("hidden", "opacity-0");
            document.getElementById("home-screen").classList.remove("hidden");
        }
    </script>
</body>
</html>
